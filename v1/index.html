<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Audio Pro - Recorder & Editor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>William Yap Audio recorders</h1>
            <p>Advanced Recording & Processing</p>
        </header>

        <main>
            <section class="visualizer-container">
                <canvas id="waveform"></canvas>
            </section>

            <section class="controls-main">
                <button id="recordBtn" class="btn btn-record">Record</button>
                <button id="stopBtn" class="btn btn-stop" disabled>Stop</button>
                <button id="playBtn" class="btn btn-play" disabled>Play</button>
                <input type="file" id="loadFile" accept="audio/mp3,audio/wav" style="display:none">
                <button id="loadBtn" class="btn btn-load">Open MP3</button>
                <button id="saveBtn" class="btn btn-save" disabled>Save MP3</button>
            </section>

            <section class="effects-panel">
                <h2>Audio Effects</h2>
                <div class="effects-grid">
                    <div class="effect-control">
                        <label>Gain (Volume)</label>
                        <input type="range" id="gainSlider" min="0" max="2" step="0.1" value="1">
                    </div>
                    
                    <div class="effect-control">
                        <label>Speed / Pitch</label>
                        <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1">
                    </div>

                    <div class="eq-container full-width">
                        <h3>20-Band Graphic EQ</h3>
                        <div id="eq-bands" class="eq-bands"></div>
                    </div>

                    <div class="effect-buttons">
                        <button id="fadeInBtn" class="btn-fx">Fade In</button>
                        <button id="fadeOutBtn" class="btn-fx">Fade Out</button>
                        <button id="noiseRedBtn" class="btn-fx">Noise Reduction</button>
                        <button id="normalizeBtn" class="btn-fx">Normalize</button>
                        <button id="compressorBtn" class="btn-fx">Compressor</button>
                        <button id="limiterBtn" class="btn-fx">Hard Limiter</button>
                        <button id="delayBtn" class="btn-fx">Delay</button>
                        <button id="distortionBtn" class="btn-fx">Distortion</button>
                        <button id="reverbBtn" class="btn-fx">Reverb</button>
                        <button id="reverseBtn" class="btn-fx">Reverse</button>
                        <button id="invertBtn" class="btn-fx">Invert</button>
                        <button id="removeSilenceBtn" class="btn-fx">Remove Silence</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="effects.js"></script>
    <script src="recorder.js"></script>
    <script src="script.js"></script>
</body>
</html>
