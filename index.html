<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Audio Pro v6.3 - Studio Master dipersembahkan buat Tri Suaka</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
</head>
<body>
    <!-- Password Overlay -->
    <div id="password-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <h2 style="color: #03dac6; margin-bottom: 20px;">Protected Access</h2>
        <input type="password" id="app-password" placeholder="Enter Password" style="padding: 12px; border-radius: 8px; border: none; width: 250px; text-align: center; font-size: 1.1em;">
        <button id="login-btn" style="margin-top: 15px; padding: 10px 30px; border-radius: 8px; border: none; background: #03dac6; color: #000; font-weight: bold; cursor: pointer;">Login</button>
        <p id="password-error" style="color: #f44336; margin-top: 10px; display: none;">Wrong Password!</p>
    </div>

    <div id="main-app" style="display: none;">
        <div class="container">
            <header>
                <h1>Web Audio Pro <span class="version">persembahan buat Tri Suaka</span></h1>
                <p>Professional Studio Master & Recorder</p>
            </header>

            <main>
                <section class="recorder-section">
                    <div class="visualizer-container">
                        <canvas id="waveform"></canvas>
                    </div>
                    
                    <div class="controls-main">
                        <button id="recordBtn" class="btn btn-record">Record</button>
                        <button id="stopBtn" class="btn btn-stop" disabled>Stop</button>
                        <button id="playBtn" class="btn btn-play" disabled>Play</button>
                        <button id="loadBtn" class="btn btn-load">Open MP3</button>
                        <button id="saveBtn" class="btn btn-save" disabled>Save MP3</button>
                        <input type="file" id="loadFile" accept="audio/*" style="display: none;">
                    </div>
                </section>

                <div class="studio-layout">
                    <section class="effects-panel">
                        <button id="magicMasterBtn" class="btn btn-magic full-width">✨ One-Click Master</button>
                        
                        <div class="control-group">
                            <label>Gain</label>
                            <input type="range" id="gainSlider" min="0" max="2" step="0.1" value="1">
                        </div>
                        
                        <div class="control-group">
                            <label>Playback Rate</label>
                            <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1">
                        </div>

                        <h3>Studio FX</h3>
                        <div class="effects-grid">
                            <button id="exciterBtn" class="btn-fx">Exciter</button>
                            <button id="deesserBtn" class="btn-fx">De-Esser</button>
                            <button id="stereoBtn" class="btn-fx">Stereo Widener</button>
                            <button id="compressorBtn" class="btn-fx">Compressor</button>
                            <button id="reverbBtn" class="btn-fx">Reverb</button>
                            <button id="delayBtn" class="btn-fx">Delay</button>
                            <button id="limiterBtn" class="btn-fx">Hard Limiter</button>
                            <button id="normalizeBtn" class="btn-fx">Normalize</button>
                            <button id="noiseRedBtn" class="btn-fx">Noise Gate</button>
                            <button id="distortionBtn" class="btn-fx">Distortion</button>
                            <button id="fadeInBtn" class="btn-fx">Fade In</button>
                            <button id="fadeOutBtn" class="btn-fx">Fade Out</button>
                            <button id="reverseBtn" class="btn-fx">Reverse</button>
                            <button id="invertBtn" class="btn-fx">Invert</button>
                            <button id="removeSilenceBtn" class="btn-fx">Remove Silence</button>
                        </div>
                    </section>

                    <section class="eq-panel">
                        <h3>Manual 20-Band Graphic EQ</h3>
                        <div id="eq-bands" class="eq-container">
                            <!-- Generated by JS -->
                        </div>
                        <button id="applyEqBtn" class="btn btn-apply full-width">Apply 20-Band EQ</button>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <script src="effects.js"></script>
    <script src="recorder.js"></script>
    <script src="script.js"></script>
</body>
</html>
